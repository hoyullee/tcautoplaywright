name: Run Playwright Tests

on:
  repository_dispatch:
    types: [run_playwright_tests]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 체크아웃
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Python 3.11 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          pip install playwright pytest pytest-asyncio anyio python-dotenv
          playwright install --with-deps chromium

      - name: 실행 디렉토리 준비
        run: mkdir -p work screenshots test_results logs

      - name: 테스트 실행
        env:
          WANTED_TEST_EMAIL: ${{ secrets.WANTED_TEST_EMAIL }}
          WANTED_TEST_PASSWORD: ${{ secrets.WANTED_TEST_PASSWORD }}
        run: |
          pytest test/ -v --tb=short 2>&1 | tee logs/pytest_output.log || true

      - name: 테스트 결과 요약
        if: always()
        run: |
          echo "======================================"
          echo "📊 테스트 결과 요약"
          echo "======================================"
          grep -E "PASSED|FAILED|ERROR|passed|failed|error" logs/pytest_output.log | tail -20 || true

      - name: 테스트 결과 업로드 (Artifacts)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: |
            test/
            test_results/
            screenshots/
            logs/
          retention-days: 30
          if-no-files-found: warn
