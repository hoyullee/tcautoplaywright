name: Run Playwright Tests

on:
  repository_dispatch:
    types: [run_playwright_tests]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: 체크아웃
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
      
      - name: Python 3.11 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: 의존성 설치
        run: |
          pip install playwright requests python-dotenv
          playwright install chromium
      
      - name: 테스트 실행
        run: |
          export PROJECT_CODE="${{ secrets.PROJECT_CODE }}"
          export PRESET_HASH="${{ secrets.PRESET_HASH }}"
          export TEST_CASES='${{ toJson(github.event.client_payload.test_cases) }}'
          
          echo "======================================"
          echo "🔍 테스트 실행 전 환경변수 확인"
          echo "======================================"
          echo "PROJECT_CODE: $PROJECT_CODE"
          echo "PRESET_HASH 존재: $([[ -n "$PRESET_HASH" ]] && echo 'Yes' || echo 'No')"
          echo "PRESET_HASH 길이: ${#PRESET_HASH}"
          echo "======================================"
          echo ""
          
          python main_github.py
      
      # 테스트 결과 업로드
      - name: 테스트 결과 업로드 (Artifacts)
        if: always()  # 성공/실패 여부와 관계없이 항상 실행
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: |
            test/
            test_results/
            screenshots/
            logs/
          retention-days: 30  # 30일 보관
          if-no-files-found: warn  # 파일이 없으면 경고만